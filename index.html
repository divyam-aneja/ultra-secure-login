<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Secure Login v999</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 420px;
  background: rgba(30,41,59,0.95);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(139,92,246,0.4);
}

h1 {
  text-align: center;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  font-size: 12px;
  color: #a5b4fc;
  margin-bottom: 20px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: linear-gradient(45deg, #8b5cf6, #ec4899);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.challenge-box {
  margin-top: 20px;
}

.challenge {
  background: #334155;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.challenge:hover {
  transform: scale(1.05);
}

.output {
  margin-top: 20px;
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  font-size: 13px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>Ultra Secure Login v999</h1>
<div class="subtitle">We don't verify credentials. We evaluate souls.</div>

<input placeholder="Username">
<input type="password" placeholder="Password">

<select>
<option>Select Zodiac</option>
<option>Aries</option><option>Taurus</option><option>Gemini</option>
<option>Cancer</option><option>Leo</option><option>Virgo</option>
<option>Libra</option><option>Scorpio</option><option>Sagittarius</option>
<option>Capricorn</option><option>Aquarius</option><option>Pisces</option>
</select>

<button onclick="start()">LOGIN</button>

<div class="challenge-box" id="challengeBox"></div>
<div class="output" id="output"></div>

</div>

<script>
let step = 0;

let challenges = [
  "Click this button with confidence",
  "Click again but this time doubt yourself",
  "Click slowly… we’re observing",
  "Click as if your future depends on it",
  "Click but think about your past mistakes",
  "Click while questioning reality",
  "Click to prove existence"
];

let reasons = [
  "You clicked too confidently.",
  "You hesitated. Suspicious.",
  "System sensed overthinking.",
  "Your aura did not match our standards.",
  "We just don't feel like it.",
  "Too human. Rejected.",
  "Too robotic. Also rejected."
];

function start() {
  step = 0;
  document.getElementById("output").innerText = "Initializing 99 security checks...\n";
  nextChallenge();
}

function nextChallenge() {
  let box = document.getElementById("challengeBox");
  if (step < challenges.length) {
    box.innerHTML = `
      <div class="challenge" onclick="completeChallenge()">
        ${challenges[step]}
      </div>
    `;
  } else {
    finalize();
  }
}

function completeChallenge() {
  let output = document.getElementById("output");

  output.innerText += "✔ Task completed: " + challenges[step] + "\n";
  step++;

  setTimeout(() => {
    nextChallenge();
  }, 800);
}

function finalize() {
  let output = document.getElementById("output");
  let box = document.getElementById("challengeBox");

  box.innerHTML = "";

  output.innerText += "\nRunning final AI evaluation...\n";
  output.innerText += "Checking emotional patterns...\n";
  output.innerText += "Consulting higher intelligence...\n";

  let reason = reasons[Math.floor(Math.random() * reasons.length)];

  setTimeout(() => {
    output.innerText += "\n❌ ACCESS DENIED\nReason: " + reason;
  }, 2000);
}
</script>

</body>
</html>
