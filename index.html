<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Secure Login System v999</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.box {
  background: rgba(30,41,59,0.95);
  padding: 30px;
  border-radius: 20px;
  width: 420px;
  box-shadow: 0 0 40px rgba(139,92,246,0.5);
}

h2 {
  text-align: center;
}

.tagline {
  text-align: center;
  font-size: 12px;
  color: #a5b4fc;
  margin-bottom: 20px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  background: linear-gradient(45deg, #8b5cf6, #ec4899);
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.challenge {
  margin-top: 10px;
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
}

.output {
  margin-top: 20px;
  background: #0f172a;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="box">
<h2>Ultra Secure Login v999</h2>
<div class="tagline">"We don't trust users. We test them."</div>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<select id="zodiac">
<option value="">Select Zodiac</option>
<option>Aries</option>
<option>Taurus</option>
<option>Gemini</option>
<option>Cancer</option>
<option>Leo</option>
<option>Virgo</option>
<option>Libra</option>
<option>Scorpio</option>
<option>Sagittarius</option>
<option>Capricorn</option>
<option>Aquarius</option>
<option>Pisces</option>
</select>

<button onclick="start()">INITIATE LOGIN</button>

<div id="challengeBox"></div>
<div id="output" class="output"></div>

</div>

<script>
let challenges = [
  "Click here to prove you are not a robot 🤨",
  "Click again… we don’t trust the first click",
  "Click 5 times to confirm commitment",
  "Click slowly… suspicious speed detected",
  "Click but emotionally",
  "Click while thinking about your life choices",
  "Click only if you deserve access"
];

let reasons = [
  "You blinked too fast. Suspicious.",
  "Your vibe is off today.",
  "AI committee didn’t like your energy.",
  "You seem like someone who says 'ok' in arguments.",
  "Your zodiac sign raised concerns.",
  "Too normal. That’s suspicious.",
  "Too unique. That’s also suspicious.",
  "System felt uncomfortable.",
  "Your biscuit choice lacked personality.",
  "We just don’t feel like letting you in."
];

function start() {
  let challengeBox = document.getElementById("challengeBox");
  let output = document.getElementById("output");

  output.innerText = "Initializing 47 security layers...\n";

  let randomChallenge = challenges[Math.floor(Math.random() * challenges.length)];

  challengeBox.innerHTML = `<div class="challenge" onclick="verify()">${randomChallenge}</div>`;
}

function verify() {
  let output = document.getElementById("output");
  let challengeBox = document.getElementById("challengeBox");

  output.innerText += "Analyzing click behavior...\n";
  output.innerText += "Checking emotional stability...\n";
  output.innerText += "Consulting AI ethics board...\n";
  output.innerText += "Running unnecessary algorithms...\n";

  let randomReason = reasons[Math.floor(Math.random() * reasons.length)];

  setTimeout(() => {
    output.innerText += "\nFINAL RESULT:\n❌ ACCESS DENIED\nReason: " + randomReason;
    challengeBox.innerHTML = "";
  }, 2000);
}
</script>

</body>
</html>
